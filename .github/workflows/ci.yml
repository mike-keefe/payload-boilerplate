name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      # fetch-depth: 0 is required so gitleaks can diff the pushed commit range
      # against its parents. Without it, checkout@v6 does a shallow clone and
      # gitleaks fails with "ambiguous argument <sha>^..<sha>".
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run type-check
      - run: pnpm run lint
      - run: pnpm run format:check
      - name: Check for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: validate
    env:
      DATABASE_URI: postgresql://payload:payload@localhost:5432/payload_test
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'test-secret-at-least-32-characters-long' }}
      NEXT_PUBLIC_SERVER_URL: http://localhost:3000
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: payload
          POSTGRES_PASSWORD: payload
          POSTGRES_DB: payload_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U payload"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    env:
      DATABASE_URI: ${{ secrets.DATABASE_URI || 'postgresql://payload:payload@localhost:5432/payload_build' }}
      PAYLOAD_SECRET: ${{ secrets.PAYLOAD_SECRET || 'build-secret-at-least-32-characters-long' }}
      NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL || 'http://localhost:3000' }}
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
